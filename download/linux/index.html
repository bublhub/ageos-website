<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Downloading AgeOS for Linux</title>
    <link rel="canonical" href="https://github.com/ageos-labs/ageos-runtime/releases/latest">
  </head>
  <body>
    <p id="status">Finding the latest AgeOS Linux download...</p>
    <p>
      <a id="fallback-link" href="https://github.com/ageos-labs/ageos-runtime/releases/latest" hidden>
        Open the latest AgeOS release
      </a>
    </p>
    <script>
      const latestReleaseApi = "https://api.github.com/repos/ageos-labs/ageos-runtime/releases/latest";
      const latestReleasePage = "https://github.com/ageos-labs/ageos-runtime/releases/latest";
      const status = document.querySelector("#status");
      const fallbackLink = document.querySelector("#fallback-link");

      async function redirectToLatestAsset() {
        try {
          const response = await fetch(latestReleaseApi, {
            headers: {
              Accept: "application/vnd.github+json",
            },
          });

          if (!response.ok) {
            throw new Error(`GitHub release lookup failed: ${response.status}`);
          }

          const release = await response.json();
          const assets = Array.isArray(release.assets) ? release.assets : [];
          const candidates = assets.filter((asset) => asset.name?.toLowerCase().endsWith(".deb"));
          const asset =
            candidates.find((candidate) => candidate.name.toLowerCase().includes("x64")) ||
            candidates.find((candidate) => candidate.name.toLowerCase().includes("amd64")) ||
            candidates[0];

          if (!asset?.browser_download_url) {
            throw new Error("No Linux download asset found");
          }

          window.location.replace(asset.browser_download_url);
        } catch {
          status.textContent = "Could not find the Linux installer automatically.";
          fallbackLink.hidden = false;
          fallbackLink.href = latestReleasePage;
        }
      }

      redirectToLatestAsset();
    </script>
  </body>
</html>
